services:
  mysql:
    image: mysql:8.0
    container_name: pavas_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: work_orders_db
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: pavas_backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: work_orders_db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_DIALECT: mysql
      JWT_SECRET: change_this_secret
      JWT_EXPIRES_IN: 1h
      LOGIN_RATE_LIMIT_WINDOW_MS: 900000
      LOGIN_RATE_LIMIT_MAX: 5
      ADMIN_NAME: Administrador
      ADMIN_EMAIL: admin@taller.com
      ADMIN_PASSWORD: Admin12345!
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    container_name: pavas_frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"

volumes:
  mysql_data:
